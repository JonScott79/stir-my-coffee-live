<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Admin Panel – Stir My Coffee</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="css/styles.css" rel="stylesheet" />

<style>
body { padding: 20px; }

.admin-container {
  max-width: 1100px;
  margin: auto;
}

.card {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.danger { background: #e74c3c; color: white; }
.warn { background: #f39c12; color: white; }
.good { background: #2ecc71; color: white; }
.secondary { background: #ccc; }

input {
  padding: 10px;
  width: 100%;
  margin-bottom: 10px;
}

.small { font-size: 12px; color: #666; }
.flag { color: #e74c3c; font-weight: bold; }

.collapsible {
  cursor: pointer;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="admin-container">

<h1>⚙️ Admin Panel</h1>

<div id="loginCard" class="card">
  <h2>Admin Login</h2>
  <input id="emailInput" placeholder="Email">
  <input id="passwordInput" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none;">

  <!-- REPORTS -->
  <div class="card">
    <div class="row">
      <h2>🚨 Reports</h2>
      <button onclick="logout()">Logout</button>
    </div>
    <div id="reports"></div>
  </div>

  <!-- SEARCH -->
  <div class="card">
    <h2>🔍 Search Locations</h2>
    <input id="searchInput" placeholder="Search by name..." oninput="filterLocations()">
  </div>

  <!-- LOCATIONS -->
  <div class="card">
    <h2>📍 Locations</h2>
    <div id="locations"></div>
  </div>

  <!-- DELETED -->
  <div class="card">
    <h2 class="collapsible" onclick="toggleDeleted()">🗑️ Deleted Locations (toggle)</h2>
    <div id="deletedLocations" style="display:none;"></div>
  </div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDuPgwpIZfAoo_88NhfC4VfpOObPUVNnNM",
  authDomain: "stir-my-coffee.firebaseapp.com",
  projectId: "stir-my-coffee"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let allLocations = [];
let reportCounts = {};

// ========================
// AUTH
// ========================

function login() {
  auth.signInWithEmailAndPassword(emailInput.value, passwordInput.value)
    .catch(err => alert(err.message));
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if (user) {
    loginCard.style.display = "none";
    adminPanel.style.display = "block";
    initAdmin();
  } else {
    loginCard.style.display = "block";
    adminPanel.style.display = "none";
  }
});

// ========================
// INIT
// ========================

async function initAdmin() {
  try {
    await loadReports();
    await loadLocations();
  } catch (e) {
    console.error("Init failed", e);
    alert("Failed to load admin panel");
  }
}

// ========================
// REPORTS
// ========================

async function loadReports() {
  const container = document.getElementById("reports");
  container.innerHTML = "Loading...";

  try {
    const snapshot = await db.collection("reports")
      .orderBy("timestamp", "desc")
      .limit(100)
      .get();

    reportCounts = {};
    container.innerHTML = "";

    snapshot.forEach(doc => {
      const d = doc.data();
      reportCounts[d.locationId] = (reportCounts[d.locationId] || 0) + 1;

      const el = document.createElement("div");
      el.className = "card";

      el.innerHTML = `
        <div class="row">
          <div>
            <strong>${d.name || "Unknown"}</strong><br>
            ${d.reason}
            ${d.details ? `<div class="small">📝 ${d.details}</div>` : ""}
          </div>
          <div>
            <button onclick="viewOnMap('${d.locationId}', ${d.lat}, ${d.lng})">View</button>
            <button class="danger" onclick="deleteLocation('${d.locationId}', '${doc.id}', this)">Delete</button>
            <button onclick="clearReport('${doc.id}', this)">Ignore</button>
          </div>
        </div>
      `;

      container.appendChild(el);
    });

  } catch (e) {
    console.error("Failed to load reports", e);
    container.innerHTML = "Failed to load reports";
  }
}

async function clearReport(id, btn) {
  btn.innerText = "Removing...";
  try {
    await db.collection("reports").doc(id).delete();
    btn.closest(".card").remove();
  } catch (e) {
    alert("Failed");
  }
}

// ========================
// LOCATIONS + FAST VOTES
// ========================

async function getVotesForIds(ids) {
  if (!ids.length) return {};

  const voteMap = {};
  const chunks = [];

  for (let i = 0; i < ids.length; i += 10) {
    chunks.push(ids.slice(i, i + 10));
  }

  for (const chunk of chunks) {
    const snap = await db.collection("votes")
      .where(firebase.firestore.FieldPath.documentId(), "in", chunk)
      .get();

    snap.forEach(doc => {
      voteMap[doc.id] = doc.data();
    });
  }

  return voteMap;
}

async function loadLocations() {
  const container = document.getElementById("locations");
  container.innerHTML = "Loading...";

  try {
    const snapshot = await db.collection("locations").limit(200).get();

    const baseLocations = snapshot.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));

    // 🔥 Only fetch votes for these
    const ids = baseLocations.map(l => l.id);
    const votes = await getVotesForIds(ids);

    allLocations = baseLocations.map(loc => {
      const v = votes[loc.id] || {};

      const up = v.upvotes || 0;
      const down = v.downvotes || 0;
      const total = up + down;

      return {
        ...loc,
        votes: total,
        percent: total ? Math.round((up / total) * 100) : 0
      };
    });

    renderLocations(allLocations);

  } catch (e) {
    console.error("Failed to load locations", e);
    container.innerHTML = "Failed to load locations";
  }
}

// ========================
// RENDER
// ========================

function renderLocations(list) {
  const container = document.getElementById("locations");
  container.innerHTML = "";

  list.forEach(loc => {
    const count = reportCounts[loc.id] || 0;

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <div class="row">
        <div>
          <strong>${loc.name || "Unnamed"}</strong><br>
          ${loc.lat}, ${loc.lng}<br>
          🎯 ${loc.percent || 0}% (${loc.votes || 0} votes)
          ${count >= 3 ? `<div class="flag">⚠️ ${count} reports</div>` : ""}
        </div>

        <div>
          <button onclick="viewOnMap('${loc.id}', ${loc.lat}, ${loc.lng})">View</button>
          <button class="warn" onclick="softDelete('${loc.id}', this)">Hide</button>
          <button class="danger" onclick="deleteLocation('${loc.id}', null, this)">Delete</button>
        </div>
      </div>
    `;

    container.appendChild(el);
  });
}

// ========================
// SEARCH
// ========================

function filterLocations() {
  const term = (searchInput.value || "").toLowerCase();

  const filtered = allLocations.filter(l =>
    (l.name || "").toLowerCase().includes(term)
  );

  renderLocations(filtered);
}

// ========================
// DELETE / SOFT DELETE
// ========================

async function softDelete(id, btn) {
  btn.innerText = "Hiding...";
  try {
    await db.collection("locations").doc(id).update({ hidden: true });
    loadLocations();
  } catch {
    alert("Failed");
  }
}

async function deleteLocation(id, reportId = null, btn) {
  if (!confirm("Delete permanently?")) return;

  btn.innerText = "Deleting...";

  try {
    await db.collection("locations").doc(id).delete();

    if (reportId) {
      await db.collection("reports").doc(reportId).delete();
    }

    loadReports();
    loadLocations();
  } catch {
    alert("Delete failed");
  }
}

// ========================
// DELETED VIEW
// ========================

function toggleDeleted() {
  const el = document.getElementById("deletedLocations");
  el.style.display = el.style.display === "none" ? "block" : "none";

  loadDeleted();
}

async function loadDeleted() {
  const container = document.getElementById("deletedLocations");
  container.innerHTML = "Loading...";

  try {
    const snapshot = await db.collection("locations")
      .where("hidden", "==", true)
      .limit(100)
      .get();

    container.innerHTML = "";

    snapshot.forEach(doc => {
      const d = doc.data();

      const el = document.createElement("div");
      el.className = "card";

      el.innerHTML = `
        <div class="row">
          <div>${d.name}</div>
          <button class="good" onclick="restore('${doc.id}')">Restore</button>
        </div>
      `;

      container.appendChild(el);
    });

  } catch {
    container.innerHTML = "Failed to load";
  }
}

function restore(id) {
  db.collection("locations").doc(id).update({ hidden: false })
    .then(loadDeleted);
}

// ========================
// MAP VIEW
// ========================

function viewOnMap(id, lat, lng) {
  if (lat && lng) {
    window.open(`map.html?lat=${lat}&lng=${lng}`, "_blank");
  }
}
</script>

</body>
</html>
