<!DOCTYPE html>
<html lang="en">
<head>

<!-- Clarity -->
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wutstzkpmk");
</script>


<meta charset="utf-8">
<title>Stir My Coffee™ | Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Explore nearby coffee shops, add locations, report issues, and help improve coffee experiences with Stir My Coffee.">

<link rel="icon" href="/images/favicon.ico">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/map.css">
<!-- Seasonal Styles -->
<link id="baseTheme" rel="stylesheet" />
<!-- Holiday Styles -->
<link id="holidayTheme" rel="stylesheet" />

</head>

<body>

<div id="header">

  <div class="header-left">
    <a href="index.html">
      <img src="images/StirLogo.png" class="logo">
    </a>
  </div>

  <div class="header-center">
<div id="mapInstructions">
  Tap/Click map to add • Tap/Click shops to vote
</div>

    <div class="header-actions">
      <button onclick="goToList()">Home</button>
      <button onclick="goToUser()">📍 Center Map</button>
    </div>
  </div>

</div>

<div id="map"></div>

<div id="submitPanel" class="panel">
  <b>Add Coffee Shop</b><br><br>

  <select id="shopChain" onchange="handleChainChange()">
    <option value="">Select Chain</option>
    <option value="Starbucks">Starbucks</option>
    <option value="Dunkin">Dunkin</option>
    <option value="Tim Hortons">Tim Hortons</option>
    <option value="Peet's Coffee">Peet's Coffee</option>
    <option value="Caribou Coffee">Caribou Coffee</option>
    <option value="Biggby Coffee">Biggby Coffee</option>
    <option value="Philz Coffee">Philz Coffee</option>
    <option value="Blue Bottle Coffee">Blue Bottle Coffee</option>
    <option value="Other">Other (Local / Independent)</option>
  </select><br><br>

  <input id="shopName" placeholder="Shop name" disabled><br><br>

  <button onclick="submitShop()">Submit</button>
  <button onclick="closeSubmitForm()">Cancel</button>
</div>

<div id="reportPanel" class="panel">
  <b>Report Location</b><br><br>

  <select id="reportReason" onchange="handleReportReasonChange()">
    <option value="">Select Reason</option>
    <option value="wrong">Wrong Location</option>
    <option value="duplicate">Duplicate</option>
    <option value="closed">Closed Permanently</option>
    <option value="bad_data">Bad Data</option>
    <option value="other">Other</option>
  </select><br><br>

  <textarea
    id="reportDetails"
    placeholder="Describe the issue..."
    style="display:none;width:100%;min-height:90px;padding:8px;border-radius:8px;border:1px solid #ccc;resize:vertical;"
  ></textarea>

  <div style="display:flex;gap:8px;margin-top:12px;">
    <button onclick="submitReport()">Submit</button>
    <button onclick="closeReportPanel()">Cancel</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script type="module" src="js/map.js"></script>

</body>
</html>
