<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">

<title>Stir My Coffee™ | Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="/images/favicon.ico">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/map.css">

</head>

<body>

<div id="header">
  <img src="images/StirLogo.png" id="logo">

  <button id="backBtn" onclick="goToList()">📋 List</button>
  <button id="locBtn" onclick="goToUser()">📍 Center</button>
  <button id="submitShopBtn" onclick="openSubmitForm()">➕ Add</button>
</div>

<div id="map"></div>

<div id="submitPanel" class="panel">
  <b>Add Coffee Shop</b><br><br>
  Click map to place<br><br>
  <input id="shopName" placeholder="Shop name"><br><br>
  <button onclick="submitShop()">Submit</button>
  <button onclick="closeSubmitForm()">Cancel</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script type="module" src="js/map.js"></script>

</body>
</html>
